name: Sync Docs to Wiki

# Prerequisites:
# 1. Initialize the wiki manually: Go to repo Settings → Wiki → enable,
#    then create at least one page via the GitHub UI (e.g., "Home").
# 2. GITHUB_TOKEN has wiki push access by default for public repos.
#    For private repos, use a PAT with `repo` scope in secrets.WIKI_TOKEN.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'SETUP.md'
      - 'CONTRIBUTING.md'
      - 'CHANGELOG.md'

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout wiki
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync docs to wiki
        run: |
          # Clean wiki (except .git)
          find wiki -mindepth 1 -not -path 'wiki/.git*' -delete

          # Copy docs/ content to wiki root
          cp -r docs/* wiki/

          # Copy root-level docs
          cp README.md wiki/
          cp SETUP.md wiki/
          cp CONTRIBUTING.md wiki/
          cp CHANGELOG.md wiki/

          # Rename docs/README.md to avoid conflict with root README
          mv wiki/README.md wiki/Documentation-Overview.md 2>/dev/null || true

          # Generate _Sidebar.md for wiki navigation
          cat > wiki/_Sidebar.md << 'EOF'
# NOIR Wiki

